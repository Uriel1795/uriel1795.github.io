<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEX V5 Brain Screen Playground</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f13;
    --surface: #161820;
    --surface2: #1e2130;
    --border: #2a2d3e;
    --accent: #c8f000;
    --accent2: #00c8f0;
    --accent3: #f06000;
    --text: #e8eaf0;
    --text-dim: #6b7080;
    --text-mid: #9ba0b0;
    --err: #f04060;
    --run: #30d060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }

  .logo-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--accent);
    color: #0d0f13;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .logo-pill span { font-size: 17px; }

  header h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  header h1 em { color: var(--accent); font-style: normal; }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: 1fr auto;
    gap: 0;
    overflow: hidden;
    height: calc(100vh - 50px);
  }

  /* ── Editor panel ── */
  .editor-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .panel-header .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  .examples-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .examples-bar label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 4px;
  }

  .ex-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .ex-btn:hover {
    background: var(--border);
    color: var(--text);
    border-color: var(--accent);
  }

  .editor-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  #line-nums {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 42px;
    padding: 16px 0 16px 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    text-align: right;
    padding-right: 8px;
    pointer-events: none;
    overflow: hidden;
    user-select: none;
  }

  #editor {
    position: absolute;
    inset: 0;
    padding: 16px 16px 16px 58px;
    background: transparent;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    border: none;
    outline: none;
    resize: none;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    tab-size: 2;
    spellcheck: false;
  }

  /* ── Bottom bar (editor) ── */
  .editor-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .btn {
    display: flex; align-items: center; gap: 7px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-run {
    background: var(--run);
    color: #0a140d;
  }

  .btn-run:hover { background: #44e870; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(48,208,96,0.3); }
  .btn-run:active { transform: translateY(0); }

  .btn-clear {
    background: var(--surface2);
    color: var(--text-mid);
    border: 1px solid var(--border);
  }

  .btn-clear:hover { background: var(--border); color: var(--text); }

  #status {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #status.ok { color: var(--run); }
  #status.err { color: var(--err); }

  /* ── Brain panel ── */
  .brain-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 28px;
    background: var(--bg);
    gap: 14px;
    min-width: 580px;
  }

  .brain-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brain-label::before, .brain-label::after {
    content: '';
    display: block;
    height: 1px;
    width: 30px;
    background: var(--border);
  }

  /* Brain hardware shell */
  .brain-shell {
    background: linear-gradient(160deg, #2a2c2e 0%, #1a1c1e 60%, #141618 100%);
    border-radius: 14px;
    padding: 18px 22px 14px;
    box-shadow:
      0 0 0 1px #3a3c3e,
      0 8px 40px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
  }

  .brain-top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .brain-logo {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #555;
    text-transform: uppercase;
  }

  .brain-leds {
    display: flex;
    gap: 5px;
  }

  .led {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #222;
    transition: all 0.3s;
  }

  .led.active {
    background: var(--run);
    box-shadow: 0 0 6px var(--run);
  }

  /* Screen bezel */
  .screen-bezel {
    background: #0a0a0a;
    border-radius: 6px;
    padding: 5px;
    box-shadow:
      inset 0 2px 6px rgba(0,0,0,0.8),
      0 0 0 1px #111;
    position: relative;
  }

  canvas#brain-screen {
    display: block;
    border-radius: 3px;
    cursor: crosshair;
    image-rendering: pixelated;
  }

  /* Coord overlay */
  #coord-display {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.75);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .screen-bezel:hover #coord-display { opacity: 1; }

  .brain-bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }

  .vex-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: #444;
    text-transform: uppercase;
  }

  .brain-port-row {
    display: flex;
    gap: 3px;
  }

  .port-slot {
    width: 7px;
    height: 11px;
    background: #0d0d0d;
    border-radius: 2px;
    border: 1px solid #2a2a2a;
  }

  /* API reference */
  .api-panel {
    grid-column: 1 / 3;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    max-height: 180px;
  }

  .api-panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }

  .api-panel-header:hover { color: var(--text); }

  .chevron { transition: transform 0.2s; }
  .collapsed .chevron { transform: rotate(-90deg); }

  .api-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0;
    overflow-y: auto;
    padding: 10px 14px;
  }

  .api-item {
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.1s;
    cursor: pointer;
  }

  .api-item:hover { background: var(--surface2); }

  .api-item code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
  }

  .api-item span {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 6px;
  }

  /* Console */
  #console-out {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    min-height: 26px;
    max-height: 60px;
    overflow-y: auto;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  #console-out .err { color: var(--err); }
  #console-out .ok  { color: var(--run); }
  #console-out .log { color: var(--accent2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #404050; }

  /* run flash */
  @keyframes screenFlash {
    0%   { box-shadow: inset 0 2px 6px rgba(0,0,0,0.8), 0 0 0 1px #111, 0 0 20px rgba(200,240,0,0.3); }
    100% { box-shadow: inset 0 2px 6px rgba(0,0,0,0.8), 0 0 0 1px #111; }
  }

  .flash { animation: screenFlash 0.4s ease-out; }

  /* ── Mode toggle ── */
  .mode-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
    margin-left: auto;
  }

  .mode-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 13px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .mode-btn.active {
    background: var(--accent2);
    color: #000;
  }

  .mode-btn:not(.active):hover { color: var(--text); background: var(--surface2); }

  /* ── Translating overlay ── */
  .translating-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(13,15,19,0.88);
    backdrop-filter: blur(2px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 10;
  }

  .translating-overlay.active { display: flex; }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .translating-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--accent2);
    text-transform: uppercase;
  }

  .translating-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── Translated code preview ── */
  .translated-bar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    background: #0d1a0d;
    border-top: 1px solid #1a3a1a;
    flex-shrink: 0;
    font-size: 11px;
  }

  .translated-bar.visible { display: flex; }

  .translated-badge {
    background: #1a3a1a;
    color: var(--run);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .translated-preview {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .translated-view-btn {
    background: transparent;
    border: 1px solid #1a3a1a;
    color: var(--run);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .translated-view-btn:hover { background: #1a3a1a; }

  /* ── JS preview modal ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 600px;
    max-width: 90vw;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-mid);
  }

  .modal-close {
    margin-left: auto;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .modal-close:hover { background: var(--surface2); color: var(--text); }

  .modal-body {
    overflow-y: auto;
    padding: 16px;
  }

  .modal-body pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    white-space: pre-wrap;
    line-height: 1.6;
  }

  /* ── API Key modal ── */
  .apikey-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 460px;
    max-width: 92vw;
    padding: 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .apikey-modal h2 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
  }

  .apikey-modal h2 span { color: var(--accent2); }

  .apikey-modal p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .apikey-modal p a {
    color: var(--accent2);
    text-decoration: none;
  }

  .apikey-modal p a:hover { text-decoration: underline; }

  .key-input-row {
    display: flex;
    gap: 8px;
  }

  .key-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .key-input:focus { border-color: var(--accent2); }
  .key-input::placeholder { color: var(--text-dim); }

  .key-save-btn {
    background: var(--accent2);
    color: #000;
    border: none;
    border-radius: 5px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .key-save-btn:hover { opacity: 0.85; }

  .key-note {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface2);
    border-radius: 4px;
    padding: 8px 12px;
    line-height: 1.6;
  }

  .key-error {
    font-size: 12px;
    color: var(--err);
    font-family: 'JetBrains Mono', monospace;
    display: none;
  }

  /* key pill in header */
  .key-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .key-pill:hover { border-color: var(--accent2); color: var(--text); }
  .key-pill .dot-key { width: 6px; height: 6px; border-radius: 50%; background: var(--run); box-shadow: 0 0 5px var(--run); }
  .key-pill .dot-key.missing { background: var(--err); box-shadow: 0 0 5px var(--err); }
</style>
</head>
<body>

<header>
  <div class="logo-pill"><span>⬡</span> VEX V5</div>
  <h1>Brain Screen <em>Playground</em></h1>
  <div class="header-right">
    <span class="tag">480 × 240 px</span>
    <span class="tag">No API Key Needed</span>
  </div>
</header>

<main>
  <!-- Editor -->
  <div class="editor-panel">
    <div class="panel-header">
      <div class="dot"></div>
      <span id="panel-title">Code Editor — VEXcode C++</span>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-cpp" onclick="setMode('cpp')">C++</button>
        <button class="mode-btn"        id="btn-py"  onclick="setMode('py')">Python</button>
      </div>
    </div>
    <div class="examples-bar">
      <label>Examples:</label>
      <button class="ex-btn" onclick="loadExample('hello')">Hello World</button>
      <button class="ex-btn" onclick="loadExample('dashboard')">Dashboard</button>
      <button class="ex-btn" onclick="loadExample('shapes')">Shapes</button>
      <button class="ex-btn" onclick="loadExample('auton')">Auton Selector</button>
    </div>
    <div class="editor-wrap">
      <div id="line-nums">1</div>
      <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      <div class="translating-overlay" id="translating-overlay">
        <div class="spinner"></div>
        <div class="translating-label" id="translating-label">Translating → JS</div>
        <div class="translating-sub" id="translating-sub">Sending to Claude...</div>
      </div>
    </div>
    <div class="translated-bar" id="translated-bar">
      <span class="translated-badge">✓ Translated</span>
      <span class="translated-preview" id="translated-preview"></span>
      <button class="translated-view-btn" onclick="showTranslated()">View JS ↗</button>
    </div>
    <div id="console-out"><span class="log">// console output appears here</span></div>
    <div class="editor-footer">
      <button class="btn btn-run" id="run-btn" onclick="runCode()">▶ Run</button>
      <button class="btn btn-clear" onclick="clearScreen()">⬜ Clear Screen</button>
      <span id="lang-hint" style="display:none;font-size:11px;color:var(--accent2);font-family:'JetBrains Mono',monospace;"></span>
      <span id="status"></span>
    </div>
  </div>

  <!-- Brain -->
  <div class="brain-panel">
    <div class="brain-label">V5 Brain Display</div>
    <div class="brain-shell">
      <div class="brain-top-bar">

<script>
// ─────────────────────────────────────────
//  Canvas + Brain.Screen implementation
// ─────────────────────────────────────────
const canvas = document.getElementById('brain-screen');
const ctx = canvas.getContext('2d');

const SCREEN_W = 480, SCREEN_H = 240;

// State
let fillColor = '#000000';
let penColor  = '#ffffff';
let cursorRow = 1, cursorCol = 1;
let currentFont = 'mono20';
let consoleLines = [];
let lastTouchX = 0, lastTouchY = 0;
let pressedCallbacks = [];

const FONTS = {
  mono12: { size: 12, family: 'JetBrains Mono, monospace', rowH: 14 },
  mono15: { size: 15, family: 'JetBrains Mono, monospace', rowH: 17 },
  mono20: { size: 18, family: 'JetBrains Mono, monospace', rowH: 22 },
  mono30: { size: 26, family: 'JetBrains Mono, monospace', rowH: 30 },
  mono40: { size: 34, family: 'JetBrains Mono, monospace', rowH: 40 },
  mono60: { size: 52, family: 'JetBrains Mono, monospace', rowH: 60 },
  prop20: { size: 18, family: 'Rajdhani, sans-serif', rowH: 22 },
  prop30: { size: 26, family: 'Rajdhani, sans-serif', rowH: 30 },
  prop40: { size: 34, family: 'Rajdhani, sans-serif', rowH: 40 },
  prop60: { size: 52, family: 'Rajdhani, sans-serif', rowH: 60 },
};

function applyFont() {
  const f = FONTS[currentFont] || FONTS.mono20;
  ctx.font = `${f.size}px ${f.family}`;
}

function colorToCSS(c) {
  if (typeof c === 'string') return c;
  if (typeof c === 'number') {
    const r = (c >> 16) & 0xff;
    const g = (c >> 8)  & 0xff;
    const b =  c        & 0xff;
    return `rgb(${r},${g},${b})`;
  }
  return c;
}

const Brain = {
  Screen: {
    clearScreen(color) {
      const col = color ? colorToCSS(color) : fillColor;
      ctx.fillStyle = col;
      ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
      cursorRow = 1; cursorCol = 1;
    },
    setFillColor(color) { fillColor = colorToCSS(color); },
    setPenColor(color)  { penColor  = colorToCSS(color); },
    setFont(f) { if (FONTS[f]) currentFont = f; },
    setCursor(row, col) { cursorRow = row; cursorCol = col; },

    print(...args) {
      const text = args.join('');
      const f = FONTS[currentFont] || FONTS.mono20;
      applyFont();
      const x = (cursorCol - 1) * (f.size * 0.6);
      const y = cursorRow * f.rowH;
      ctx.fillStyle = penColor;
      ctx.fillText(text, x, y);
      cursorCol += text.length;
    },

    printAt(x, y, ...args) {
      const text = args.join('');
      applyFont();
      ctx.fillStyle = penColor;
      ctx.fillText(text, x, y);
    },

    drawLine(x1, y1, x2, y2) {
      ctx.strokeStyle = penColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    },

    drawRect(x, y, w, h) {
      ctx.strokeStyle = penColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, w, h);
    },

    fillRect(x, y, w, h) {
      ctx.fillStyle = fillColor;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = penColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, w, h);
    },

    drawCircle(x, y, r) {
      ctx.strokeStyle = penColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.stroke();
    },

    fillCircle(x, y, r) {
      ctx.fillStyle = fillColor;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = penColor;
      ctx.lineWidth = 1;
      ctx.stroke();
    },

    drawPixel(x, y) {
      ctx.fillStyle = penColor;
      ctx.fillRect(x, y, 1, 1);
    },

    drawImageFromData(x, y, w, h, data) {
      const imgData = ctx.createImageData(w, h);
      for (let i = 0; i < data.length; i++) {
        imgData.data[i] = data[i];
      }
      ctx.putImageData(imgData, x, y);
    },

    // VEXcode alias: drawRectangle = filled rect (fill + pen outline)
    drawRectangle(x, y, w, h) {
      ctx.fillStyle = fillColor;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = penColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, w, h);
    },

    // Touch / click API
    pressed(cb)    { pressedCallbacks.push(cb); },
    xPosition()    { return lastTouchX; },
    yPosition()    { return lastTouchY; },

    render() { /* no-op — canvas is immediate mode */ },
    width()  { return SCREEN_W; },
    height() { return SCREEN_H; },
  }
};

// Convenience color constants
const Color = {
  Red: '#ff2020', Green: '#20e040', Blue: '#2080ff',
  Yellow: '#f0e000', Orange: '#f06000', Purple: '#9040e0',
  Cyan: '#00d0e0', Magenta: '#d020c0', White: '#ffffff',
  Black: '#000000', Transparent: 'transparent',
  fromHex: h => h,
  fromRGB: (r,g,b) => `rgb(${r},${g},${b})`,
};

// VEXcode bare color names (used without Color. prefix in C++ land)
const VEX_GLOBALS = {
  red: Color.Red, green: Color.Green, blue: Color.Blue,
  yellow: Color.Yellow, orange: Color.Orange, purple: Color.Purple,
  cyan: Color.Cyan, magenta: Color.Magenta, white: Color.White,
  black: Color.Black, transparent: Color.Transparent,
  // color(0xRRGGBB) hex int → CSS string
  color: (hex) => {
    const r = (hex >> 16) & 0xff;
    const g = (hex >>  8) & 0xff;
    const b =  hex        & 0xff;
    return `rgb(${r},${g},${b})`;
  },
};

// ─────────────────────────────────────────
//  Mode: 'cpp' or 'py'
// ─────────────────────────────────────────
let currentMode = 'cpp';
let lastTranslatedJS = '';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-cpp').classList.toggle('active', mode === 'cpp');
  document.getElementById('btn-py').classList.toggle('active',  mode === 'py');
  document.getElementById('panel-title').textContent =
    mode === 'cpp' ? 'Code Editor — VEXcode C++' : 'Code Editor — VEXcode Python';
  document.getElementById('lang-hint').style.display = '';
  document.getElementById('lang-hint').textContent =
    (mode === 'cpp' ? 'C++' : 'Python') + ' → auto-translated by Claude';
  document.getElementById('translated-bar').classList.remove('visible');
  lastTranslatedJS = '';

  // Load appropriate placeholder if editor is empty
  const editor = document.getElementById('editor');
  if (editor.value.trim() === '' || editor.value === CPP_PLACEHOLDER || editor.value === PY_PLACEHOLDER) {
    editor.value = mode === 'cpp' ? CPP_PLACEHOLDER : PY_PLACEHOLDER;
    updateLineNums();
  }
}

const CPP_PLACEHOLDER =
`// Paste or write VEXcode C++ — hit ▶ Run and Claude translates it live!

  Brain.Screen.clearScreen(color::black);

const PY_PLACEHOLDER =
`# Paste or write VEXcode Python — hit ▶ Run and Claude translates it live!
brain.screen.clear_screen()
brain.screen.set_fill_color(Color.GREEN)
brain.screen.set_pen_color(Color.WHITE)

brain.screen.print_at(20, 95, "Hello from Python!")`;

// ─────────────────────────────────────────
//  Rule-based transpiler — no API key needed
// ─────────────────────────────────────────

// ── Shared: unquoted font names → quoted strings ──
function normalizeFonts(code) {
  const fonts = ['mono12','mono15','mono20','mono30','mono40','mono60',
                 'prop20','prop30','prop40','prop60'];
  fonts.forEach(f => {
    // only replace when not already inside quotes
    const re = new RegExp(`(?<!["\`'])\\b(${f})\\b(?!["\`'])`, 'g');
    code = code.replace(re, `"${f}"`);
  });
  // FontType.MONO20 → "mono20" etc.
  code = code.replace(/FontType\.([A-Z]+)(\d+)/g, (_, t, n) => `"${t.toLowerCase()}${n}"`);
  return code;
}

// ── C++ transpiler ──
function transpileCpp(src) {
  let c = src;

  // Strip preprocessor / namespace
  c = c.replace(/^\s*#include\s*[<"][^>"]*[>"]\s*$/gm, '');
  c = c.replace(/^\s*using\s+namespace\s+\w+\s*;\s*$/gm, '');
  c = c.replace(/^\s*vex::Brain\b/gm, 'Brain');

  // color::name  →  bare name
  c = c.replace(/color::/g, '');
  // vex::color(0xRRGGBB) → color(0xRRGGBB)
  c = c.replace(/vex::color\(/g, 'color(');

  // Brain.Screen stays identical — just remove any vex:: prefix
  c = c.replace(/vex::/g, '');

  // Font names (before type stripping so we don't mangle identifiers)
  c = normalizeFonts(c);

  // --- Type stripping ---
  // Return types on function declarations: void/int/bool/float/double/char → function
  c = c.replace(/^\s*(void|int|bool|float|double)\s+([A-Za-z_]\w*)\s*\(/gm,
                (_, _t, name) => `function ${name}(`);

  // Variable declarations: int x = ... / bool x = ... / float x = ... / const int x = ...
  c = c.replace(/\b(const\s+)?(int|bool|float|double|char\s*\*?|std::string)\s+([A-Za-z_]\w*)\s*=/g,
                (_, con, _t, name) => `${con ? 'const ' : 'let '}${name} =`);
  // Plain declarations without init: int x;
  c = c.replace(/\b(int|bool|float|double)\s+([A-Za-z_]\w*)\s*;/g, 'let $2;');

  // Remove types from function parameters: (int x, bool y) → (x, y)
  c = c.replace(/\(([\s\S]*?)\)/g, (match, inner) => {
    const cleaned = inner.replace(/\b(const\s+)?(int|bool|float|double|void|char\s*\*?|std::string)\s+([A-Za-z_]\w*)/g, '$3');
    return `(${cleaned})`;
  });

  // C++ bool literals
  c = c.replace(/\btrue\b/g, 'true').replace(/\bfalse\b/g, 'false');

  // Trailing semicolons after } (C++ structs etc.) — remove
  c = c.replace(/\}\s*;/g, '}');

  // Remove leftover :: (any remaining namespace)
  c = c.replace(/\w+::/g, '');

  return c.trim();
}

// ── Python transpiler ──
function transpilePython(src) {
  const lines = src.split('\n');
  const out = [];
  // Track indentation → brace depth
  const indentStack = [0];

  // Helper: snake_case → camelCase
  function snakeToCamel(s) {
    return s.replace(/_([a-z])/g, (_, l) => l.toUpperCase());
  }

  // brain.screen method map (snake → camel)
  const screenMethods = [
    'clear_screen','set_fill_color','set_pen_color','set_font','set_cursor',
    'print_at','print','draw_line','draw_rectangle','fill_rectangle',
    'draw_rect','fill_rect','draw_circle','fill_circle','draw_pixel',
    'pressed','x_position','y_position','render','width','height',
  ];

  function transformLine(line) {
    let l = line;

    // Strip comments
    // (keep them but convert # to //)
    l = l.replace(/^(\s*)#(.*)$/, (_, sp, rest) => `${sp}//${rest}`);

    // Imports
    if (/^\s*(from\s+vex|import\s+vex|from\s+__future__)/.test(l)) return null;

    // brain.screen.method( → Brain.Screen.camelMethod(
    screenMethods.forEach(m => {
      const camel = snakeToCamel(m);
      // capitalize Screen
      const re = new RegExp(`\\bbrain\\.screen\\.${m}\\b`, 'g');
      l = l.replace(re, `Brain.Screen.${camel}`);
    });
    // also handle brain.screen.x_position / y_position with no parens guard
    l = l.replace(/\bbrain\.screen\.([\w_]+)/g, (_, m) => `Brain.Screen.${snakeToCamel(m)}`);

    // Color.RED → red, Color.GREEN → green etc.
    l = l.replace(/\bColor\.([A-Z_]+)\b/g, (_, name) => {
      const map = { RED:'red', GREEN:'green', BLUE:'blue', YELLOW:'yellow',
                    ORANGE:'orange', PURPLE:'purple', CYAN:'cyan',
                    MAGENTA:'magenta', WHITE:'white', BLACK:'black',
                    TRANSPARENT:'transparent' };
      return map[name] || name.toLowerCase();
    });
    // Color(0xRRGGBB) → color(0xRRGGBB)
    l = l.replace(/\bColor\(0x/g, 'color(0x');

    // FontType.MONO20 → "mono20" etc.
    l = normalizeFonts(l);

    // Python not/and/or → JS
    l = l.replace(/\bnot\s+/g, '!');
    l = l.replace(/\band\b/g, '&&');
    l = l.replace(/\bor\b/g, '||');

    // None → null, True → true, False → false
    l = l.replace(/\bNone\b/g, 'null');
    l = l.replace(/\bTrue\b/g, 'true');
    l = l.replace(/\bFalse\b/g, 'false');

    // f-strings: f"...{expr}..." → `...${expr}...`
    l = l.replace(/\bf"([^"]*)"/g, (_, inner) => '`' + inner.replace(/\{/g, '${') + '`');
    l = l.replace(/\bf'([^']*)'/g, (_, inner) => '`' + inner.replace(/\{/g, '${') + '`');

    // global keyword → remove (JS uses closure scope)
    l = l.replace(/^\s*global\s+.*$/, '');

    // elif → else if
    l = l.replace(/\belif\b/g, 'else if');

    // Python integer division //  — only when not inside a string
    l = l.replace(/(\w)\s*\/\/\s*(\w)/g, 'Math.floor($1 / $2)');

    return l;
  }

  // Two-pass: first transform lines, then convert indentation to braces
  const transformed = lines.map(transformLine).filter(l => l !== null);

  // Indentation → braces pass
  for (let i = 0; i < transformed.length; i++) {
    const raw = transformed[i];
    const indent = raw.match(/^(\s*)/)[1].length;
    const trimmed = raw.trimStart();

    // Close braces for decreased indentation
    while (indent < indentStack[indentStack.length - 1]) {
      indentStack.pop();
      const closeIndent = ' '.repeat(indentStack[indentStack.length - 1]);
      out.push(closeIndent + '}');
    }

    // def → function, class → class (open brace block)
    if (/^def\s+(\w+)\s*\((.*)\)\s*:/.test(trimmed)) {
      const m = trimmed.match(/^def\s+(\w+)\s*\((.*)\)\s*:/);
      const sp = ' '.repeat(indent);
      out.push(`${sp}function ${m[1]}(${m[2]}) {`);
      indentStack.push(indent + 1); // expect deeper indent next
      continue;
    }

    // if/elif/else/for/while with colon → open brace
    if (/^(if|else if|else|for|while)\b.*:\s*$/.test(trimmed)) {
      const body = trimmed.replace(/:$/, '').replace(/^for\s+(\w+)\s+in\s+range\((\d+),\s*(\d+)(?:,\s*(-?\d+))?\)/, (_, v, s, e, st) => {
        const step = st ? `, i += ${st}` : '++' + v;
        return `for (let ${v} = ${s}; ${v} < ${e}; ${v}${st ? ` += ${st}` : '++'}`;
      }).replace(/^for\s+(\w+)\s+in\s+range\((\d+)\)/, (_, v, n) => `for (let ${v} = 0; ${v} < ${n}; ${v}++`)
        .replace(/^for\s+(\w+)\s+in\s+range\((\d+),\s*(\d+)\)/, (_, v, s, e) => `for (let ${v} = ${s}; ${v} < ${e}; ${v}++`)
        .replace(/^if\s+(.+)/, (_, cond) => `if (${cond})`)
        .replace(/^else if\s+(.+)/, (_, cond) => `else if (${cond})`)
        .replace(/^while\s+(.+)/, (_, cond) => `while (${cond})`);
      const sp = ' '.repeat(indent);
      // close paren for for-loops if needed
      const needsClose = /^for\s+\w+\s+in\s+range/.test(trimmed);
      out.push(`${sp}${body}${needsClose ? ')' : ''} {`);
      indentStack.push(indent + 1);
      continue;
    }

    // else: alone
    if (/^else\s*:$/.test(trimmed)) {
      const sp = ' '.repeat(indent);
      out.push(`${sp}else {`);
      indentStack.push(indent + 1);
      continue;
    }

    // Variable assignment: x = ... (add let if first occurrence — simple heuristic)
    // (skip if already has let/const/function or is Brain.Screen call)
    // We don't add let here to avoid double-let; JS is fine with bare assignment for globals

    // Add semicolon if line doesn't end with { or } or // comment and isn't blank
    let finalLine = raw;
    if (trimmed && !trimmed.endsWith('{') && !trimmed.endsWith('}')
        && !trimmed.startsWith('//') && !trimmed.endsWith(',')) {
      if (!finalLine.trimEnd().endsWith(';')) finalLine = finalLine.trimEnd() + ';';
    }
    out.push(finalLine);
  }

  // Close any remaining open blocks
  while (indentStack.length > 1) {
    indentStack.pop();
    out.push(' '.repeat(indentStack[indentStack.length - 1]) + '}');
  }

  return out.join('\n').trim();
}

// ── Main translate entry point (synchronous now — no API needed) ──
function translateToJS(sourceCode, mode) {
  const overlay = document.getElementById('translating-overlay');
  document.getElementById('translating-label').textContent =
    (mode === 'cpp' ? 'C++' : 'Python') + ' → JS';
  overlay.classList.add('active');
  document.getElementById('translating-sub').textContent = 'Transpiling...';

  // Use setTimeout so the overlay has a chance to paint
  return new Promise((resolve, reject) => {
    setTimeout(() => {
      overlay.classList.remove('active');
      try {
        const js = mode === 'cpp' ? transpileCpp(sourceCode) : transpilePython(sourceCode);
        resolve(js);
      } catch(e) {
        reject(e);
      }
    }, 40);
  });
}

function showTranslated() {
  document.getElementById('modal-code').textContent = lastTranslatedJS;
  document.getElementById('modal-backdrop').classList.add('open');
}

function hideTranslated() {
  document.getElementById('modal-backdrop').classList.remove('open');
}

function hideModal(e) {
  if (e.target === document.getElementById('modal-backdrop')) hideTranslated();
}
// ─────────────────────────────────────────
//  Code runner
// ─────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type || '';
}

function addConsole(msg, type) {
  const el = document.getElementById('console-out');
  const line = document.createElement('div');
  line.className = type || 'log';
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function clearConsole() {
  document.getElementById('console-out').innerHTML = '';
}

function flashLeds() {
  const leds = [document.getElementById('led1'), document.getElementById('led2'), document.getElementById('led3')];
  leds.forEach((l, i) => {
    setTimeout(() => { l.classList.add('active'); }, i * 60);
    setTimeout(() => { l.classList.remove('active'); }, 400 + i * 60);
  });
}

function runCode() {
  runTranslated();
}

async function runTranslated() {
  clearConsole();
  const sourceCode = document.getElementById('editor').value.trim();
  if (!sourceCode) { setStatus('Nothing to run', ''); return; }

  document.getElementById('run-btn').disabled = true;
  setStatus('⟳ Translating...', '');

  try {
    const js = await translateToJS(sourceCode, currentMode);
    lastTranslatedJS = js;

    const bar = document.getElementById('translated-bar');
    bar.classList.add('visible');
    document.getElementById('translated-preview').textContent = js.split('\n')[0].slice(0, 80) + '...';

    addConsole('✓ Translated by Claude (' + (currentMode === 'cpp' ? 'C++' : 'Python') + ')', 'ok');
    runJS(js);
  } catch(e) {
    setStatus('✗ ' + e.message, 'err');
    addConsole('Error: ' + e.message, 'err');
  } finally {
    document.getElementById('run-btn').disabled = false;
  }
}

function runJS(code) {
  clearConsole();
  pressedCallbacks = [];
  try {
    const globalNames = Object.keys(VEX_GLOBALS);
    const globalVals  = Object.values(VEX_GLOBALS);
    const fn = new Function('Brain', 'Color', 'console', ...globalNames, code);
    const fakeConsole = {
      log: (...a) => addConsole('> ' + a.join(' '), 'log'),
      error: (...a) => addConsole('✗ ' + a.join(' '), 'err'),
      warn: (...a)  => addConsole('⚠ ' + a.join(' '), 'log'),
    };
    fn(Brain, Color, fakeConsole, ...globalVals);
    setStatus('✓ Ran successfully', 'ok');
    flashLeds();
    document.getElementById('screen-bezel').classList.remove('flash');
    void document.getElementById('screen-bezel').offsetWidth;
    document.getElementById('screen-bezel').classList.add('flash');
  } catch(e) {
    setStatus('✗ ' + e.message, 'err');
    addConsole('Error: ' + e.message, 'err');
  }
}

function clearScreen() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
  fillColor = '#000000';
  penColor  = '#ffffff';
  cursorRow = 1; cursorCol = 1;
  currentFont = 'mono20';
  setStatus('Screen cleared', '');
}

#include "vex.h"

int AUTOCHOICE = 1;
const int BTNW = 200;
const int BTNH = 90;

void drawButton(int x, int y, const char* label, bool isSelected) {
  if (isSelected) {
    Brain.Screen.setFillColor(color::green);
  } else {
    Brain.Screen.setFillColor(color::blue);
  }
  Brain.Screen.setPenColor(color::white);
  Brain.Screen.drawRectangle(x, y, BTNW, BTNH);
  Brain.Screen.printAt(x + 10, y + (BTNH / 2) + 5, label);
}

void drawSelector() {
  Brain.Screen.clearScreen(vex::color(0x212121));
  Brain.Screen.setFillColor(vex::color(0x37474F));
  Brain.Screen.drawRectangle(0, 0, 480, 40);
  Brain.Screen.setPenColor(color::white);

}

    tx = brain.screen.x_position()

function loadExample(name) {
  const ex = EXAMPLES[name];
  if (!ex) return;
  document.getElementById('editor').value = ex[currentMode] || ex.cpp;
  updateLineNums();
  runCode();
}


// ─────────────────────────────────────────
//  Line numbers
// ─────────────────────────────────────────
function updateLineNums() {
  const lines = document.getElementById('editor').value.split('\n').length;
  const nums = Array.from({length: lines}, (_, i) => i + 1).join('\n');
  document.getElementById('line-nums').textContent = nums;
}

document.getElementById('editor').addEventListener('input', updateLineNums);
document.getElementById('editor').addEventListener('scroll', function() {
  document.getElementById('line-nums').scrollTop = this.scrollTop;
});

document.getElementById('editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart;
    this.value = this.value.substring(0, s) + '  ' + this.value.substring(this.selectionEnd);
    this.selectionStart = this.selectionEnd = s + 2;
    updateLineNums();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runCode(); }
});

// ─────────────────────────────────────────
//  Coordinate display on hover + click → pressed()
// ─────────────────────────────────────────
const bezel = document.getElementById('screen-bezel');
const coordDisplay = document.getElementById('coord-display');

function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: Math.round((e.clientX - rect.left) * (SCREEN_W / rect.width)),
    y: Math.round((e.clientY - rect.top)  * (SCREEN_H / rect.height)),
  };
}

bezel.addEventListener('mousemove', function(e) {
  const {x, y} = getCanvasCoords(e);
  coordDisplay.textContent = `${x}, ${y}`;
});

canvas.addEventListener('click', function(e) {
  const {x, y} = getCanvasCoords(e);
  lastTouchX = x;
  lastTouchY = y;
  pressedCallbacks.forEach(cb => { try { cb(); } catch(err) { addConsole('Click handler error: ' + err.message, 'err'); } });
});

// ─────────────────────────────────────────
//  API reference panel
// ─────────────────────────────────────────
const API_ENTRIES = [
  { code: 'Brain.Screen.clearScreen(color)',         desc: 'Fill entire screen' },
  { code: 'Brain.Screen.setFillColor(color)',        desc: 'Set fill color' },
  { code: 'Brain.Screen.setPenColor(color)',         desc: 'Set pen/text color' },
  { code: 'Brain.Screen.setFont("mono20")',          desc: 'Set font size' },
  { code: 'Brain.Screen.setCursor(row, col)',        desc: 'Set text cursor' },
  { code: 'Brain.Screen.print("text")',              desc: 'Print at cursor' },
  { code: 'Brain.Screen.printAt(x, y, "text")',      desc: 'Print at position' },
  { code: 'Brain.Screen.drawLine(x1,y1,x2,y2)',      desc: 'Draw a line' },
  { code: 'Brain.Screen.drawRect(x, y, w, h)',       desc: 'Draw rect outline' },
  { code: 'Brain.Screen.fillRect(x, y, w, h)',       desc: 'Draw filled rect' },
  { code: 'Brain.Screen.drawCircle(x, y, r)',        desc: 'Draw circle outline' },
  { code: 'Brain.Screen.fillCircle(x, y, r)',        desc: 'Draw filled circle' },
  { code: 'Brain.Screen.drawPixel(x, y)',            desc: 'Draw single pixel' },
  { code: 'Color.Red / .Green / .Blue',              desc: 'Named colors' },
  { code: 'Color.fromRGB(r, g, b)',                  desc: 'RGB color' },
  { code: '"#ff8800"',                               desc: 'Hex color string' },
  { code: '`hsl(${hue}, 90%, 50%)`',                 desc: 'HSL color string' },
  { code: 'Fonts: mono12/15/20/30/40/60',            desc: 'Monospace fonts' },
  { code: 'Fonts: prop20/30/40/60',                  desc: 'Proportional fonts' },
  { code: '// Ctrl+Enter',                           desc: 'Keyboard shortcut to run' },
];

const grid = document.getElementById('api-grid');
API_ENTRIES.forEach(entry => {
  const div = document.createElement('div');
  div.className = 'api-item';
  div.innerHTML = `<code>${entry.code}</code><span>— ${entry.desc}</span>`;
  div.addEventListener('click', () => {
    if (!entry.code.startsWith('//') && !entry.code.startsWith('Fonts:') && !entry.code.startsWith('"') && !entry.code.startsWith('`')) {
      const editor = document.getElementById('editor');
      const pos = editor.selectionStart;
      editor.value = editor.value.substring(0, pos) + entry.code + editor.value.substring(pos);
      editor.focus();
      editor.selectionStart = editor.selectionEnd = pos + entry.code.length;
      updateLineNums();
    }
  });
  grid.appendChild(div);
});

function toggleApi() {
  const panel = document.getElementById('api-panel');
  const grid  = document.getElementById('api-grid');
  const hdr   = document.querySelector('.api-panel-header');
  const collapsed = hdr.classList.toggle('collapsed');
  grid.style.display = collapsed ? 'none' : 'grid';
}

// ─────────────────────────────────────────
//  Port slots
// ─────────────────────────────────────────
const portRow = document.getElementById('port-row');
for (let i = 0; i < 21; i++) {
  const slot = document.createElement('div');
  slot.className = 'port-slot';
  portRow.appendChild(slot);
}

// ─────────────────────────────────────────
//  Init
// ─────────────────────────────────────────
clearScreen();
setMode('cpp');
loadExample('hello');
</script>
</body>
